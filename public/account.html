<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Conta — Modder21 Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav id="navbar">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="nav-logo">MODDER<span>21</span></a>
      <ul class="nav-links">
        <li><a href="/products.html">Produtos</a></li>
        <li><a href="/#support">Suporte</a></li>
      </ul>
      <div class="nav-right">
        <a href="/cart.html" class="cart-btn">
          🛒 <span>Carrinho</span>
          <span class="cart-count" style="display:none">0</span>
        </a>
        <button class="btn btn-outline btn-sm" id="nav-login-btn" onclick="openAuthModal('login')">Entrar</button>
        <div class="nav-user-menu" id="nav-user-menu" style="display:none">
          <span id="nav-username" style="font-size:0.82rem;color:var(--accent)"></span>
          <a href="/account.html" class="btn btn-outline btn-sm" style="border-color:var(--accent)">Conta</a>
          <button class="btn btn-sm" style="background:transparent;color:var(--text-muted);border:1px solid var(--card-border)" onclick="logout()">Sair</button>
        </div>
      </div>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <span class="section-label">Conta</span>
    <h1>Minha Conta</h1>
    <p id="account-subtitle">As tuas compras e keys de acesso.</p>
  </div>
</div>

<section style="padding:60px 0">
  <div class="container" style="max-width:860px">

    <!-- Not logged in -->
    <div id="account-guest" style="display:none;text-align:center;padding:60px 0">
      <div style="font-size:3rem;margin-bottom:16px">🔒</div>
      <h3>Não estás autenticado</h3>
      <p style="color:var(--text-muted);margin-bottom:24px">Faz login para ver as tuas compras e keys.</p>
      <button class="btn btn-primary" onclick="openAuthModal('login')">Entrar / Registar</button>
    </div>

    <!-- Logged in -->
    <div id="account-content" style="display:none">

      <!-- User info card -->
      <div class="table-card" style="padding:24px;margin-bottom:28px">
        <div style="display:flex;align-items:center;gap:16px">
          <div style="width:48px;height:48px;border-radius:50%;background:var(--accent-glow);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-family:'Orbitron',sans-serif;color:var(--accent)" id="account-avatar">?</div>
          <div>
            <div style="font-family:'Orbitron',sans-serif;font-size:1rem;color:#fff" id="account-username"></div>
            <div style="font-size:0.8rem;color:var(--text-muted)" id="account-email"></div>
          </div>
        </div>
      </div>

      <!-- Orders -->
      <h3 style="font-family:'Orbitron',sans-serif;font-size:0.8rem;letter-spacing:0.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:16px">Histórico de Compras</h3>
      <div id="orders-list">
        <div style="text-align:center;padding:40px"><div class="spinner" style="margin:auto"></div></div>
      </div>
    </div>

  </div>
</section>

<!-- Auth modal (shared) -->
<div id="auth-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="auth-tabs">
      <button class="auth-tab-btn active" data-tab="login" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab-btn" data-tab="register" onclick="switchAuthTab('register')">Registar</button>
    </div>

    <!-- Login -->
    <div id="login-form-wrap">
      <form id="auth-login-form" style="display:flex;flex-direction:column;gap:14px;margin-top:20px">
        <div id="login-error" class="auth-error" style="display:none"></div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="auth-email" type="email" placeholder="teu@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="auth-password" type="password" placeholder="••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Entrar</button>
      </form>
    </div>

    <!-- Register -->
    <div id="register-form-wrap" style="display:none">
      <form id="auth-register-form" style="display:flex;flex-direction:column;gap:14px;margin-top:20px">
        <div id="register-error" class="auth-error" style="display:none"></div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="auth-reg-username" type="text" placeholder="o teu username" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="auth-reg-email" type="email" placeholder="teu@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="auth-reg-password" type="password" placeholder="mínimo 6 caracteres" required />
        </div>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Criar Conta</button>
      </form>
    </div>

    <div class="modal-footer" style="margin-top:12px">
      <button class="btn btn-outline btn-sm" onclick="closeAuthModal()">Fechar</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <div class="footer-logo">MODDER<span>21</span> STORE</div>
      <div class="footer-divider"></div>
      <p class="footer-bottom">© 2025 Modder21 Store. Todos os direitos reservados.</p>
    </div>
  </div>
</footer>

<script src="/js/main.js"></script>
<script src="/js/auth.js"></script>
<script>
const PLAN_LABELS = { daily: 'Diário', weekly: 'Semanal', monthly: 'Mensal', lifetime: 'Vitalício' };
const PM_LABELS   = { pix: 'PIX', credit_card: 'Cartão', stripe: 'Stripe', paypal: 'PayPal' };
const STATUS_LABELS = { pending: 'Pendente', processing: 'A processar', delivered: 'Entregue', cancelled: 'Cancelado' };

document.addEventListener('DOMContentLoaded', async () => {
  if (!UserAuth.isLoggedIn()) {
    document.getElementById('account-guest').style.display = 'block';
    return;
  }

  const user = await UserAuth.loadUser();
  if (!user) {
    document.getElementById('account-guest').style.display = 'block';
    return;
  }

  document.getElementById('account-content').style.display = 'block';
  document.getElementById('account-username').textContent = user.username;
  document.getElementById('account-email').textContent = user.email;
  document.getElementById('account-avatar').textContent = user.username[0].toUpperCase();
  document.getElementById('account-subtitle').textContent = `Bem-vindo, ${user.username}!`;

  loadOrders();
});

async function loadOrders() {
  const container = document.getElementById('orders-list');
  try {
    const res = await fetch('/api/auth/orders', { headers: UserAuth.authHeaders() });
    const orders = await res.json();

    if (!orders.length) {
      container.innerHTML = `<div class="table-card" style="padding:40px;text-align:center;color:var(--text-muted)">Ainda não fizeste nenhuma compra.<br><a href="/products.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex">Ver Produtos</a></div>`;
      return;
    }

    container.innerHTML = orders.map(order => {
      const itemsHtml = order.items.map(item => {
        const keyHtml = item.key_value
          ? `<div class="key-value-box" style="margin-top:8px">
               <code>${item.key_value}</code>
               <button class="btn-copy" onclick="copyKey('${item.key_value}', this)" title="Copiar">📋</button>
             </div>
             ${item.instructions ? `<div class="key-instructions">${item.instructions}</div>` : ''}`
          : (order.status === 'delivered' && order.license_key
              ? `<div class="key-value-box" style="margin-top:8px"><code>${order.license_key}</code><button class="btn-copy" onclick="copyKey('${order.license_key}', this)" title="Copiar">📋</button></div>`
              : '<div style="font-size:0.75rem;color:var(--text-dim);margin-top:4px">Key a aguardar entrega</div>');

        return `<div class="order-item-row">
          <span>${item.product_name} <span class="plan-pill">${PLAN_LABELS[item.plan_type] || item.plan_type}</span></span>
          <span>${fmt(item.price)}</span>
          <div style="grid-column:1/-1">${keyHtml}</div>
        </div>`;
      }).join('');

      return `
        <div class="table-card" style="margin-bottom:16px;padding:24px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
            <div>
              <code style="font-size:0.78rem;color:var(--accent)">PEDIDO #${order.id.slice(0,8).toUpperCase()}</code>
              <div style="font-size:0.72rem;color:var(--text-dim);margin-top:2px">${new Date(order.created_at).toLocaleDateString('pt-PT', {day:'2-digit',month:'short',year:'numeric'})}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <span class="status-pill status-${order.status}">${STATUS_LABELS[order.status] || order.status}</span>
              <span style="font-family:'Orbitron',sans-serif;font-size:0.88rem;color:var(--accent)">${fmt(order.total)}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px">${itemsHtml}</div>
          ${order.payment_method ? `<div style="font-size:0.72rem;color:var(--text-dim);margin-top:12px;padding-top:12px;border-top:1px solid var(--card-border)">Pagamento: ${PM_LABELS[order.payment_method] || order.payment_method}</div>` : ''}
        </div>`;
    }).join('');
  } catch {
    container.innerHTML = `<div class="table-card" style="padding:24px;text-align:center;color:var(--danger)">Erro ao carregar pedidos.</div>`;
  }
}

function copyKey(key, btn) {
  navigator.clipboard.writeText(key).then(() => { btn.textContent = '✅'; setTimeout(() => btn.textContent = '📋', 2000); });
}
</script>
</body>
</html>
