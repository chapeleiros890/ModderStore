<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Modder21</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="admin-body">

<div class="admin-login">
  <div class="login-card">
    <div class="logo">MODDER<span>21</span></div>
    <small>ADMIN PANEL</small>

    <div id="login-error" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--danger);padding:10px 14px;border-radius:var(--radius);font-size:0.83rem;margin-bottom:16px"></div>

    <form id="login-form" class="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" id="username" type="text" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Login</button>
    </form>

    <div style="margin-top:20px;text-align:center">
      <a href="/" style="font-size:0.75rem;color:var(--text-dim)">← Back to store</a>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
